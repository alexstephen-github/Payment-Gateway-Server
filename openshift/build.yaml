# ImageStream + BuildConfig so OpenShift builds the container image from the
# Dockerfile using its own Docker/Buildah build strategy.
#
#   oc apply -f openshift/build.yaml
#   oc start-build payment-gateway-mock --follow
#
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: payment-gateway-mock
  labels:
    app: payment-gateway-mock
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: payment-gateway-mock
  labels:
    app: payment-gateway-mock
spec:
  # Git source: OpenShift clones the repo and builds from it directly.
  # The Dockerfile lives at the repo root, so no contextDir is set (the build
  # context is the repository root). dockerfilePath is relative to that root.
  source:
    type: Git
    git:
      uri: https://github.com/alexstephen-github/Payment-Gateway-Server.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: payment-gateway-mock:latest
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
