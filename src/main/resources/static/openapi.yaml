        state:
          type: string
        jurisdiction:
          type: string
        description:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
    TaxRate:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: tax_rate
        display_name:
          type: string
        percentage:
          type: number
        inclusive:
          type: boolean
        active:
          type: boolean
        country:
          type: string
        state:
          type: string
        jurisdiction:
          type: string
        description:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata"
        created_at:
          type: string
          format: date-time
    TaxRateList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/TaxRate"
        meta:
          $ref: "#/components/schemas/ListMeta"
    TaxCalculationRequest:
      type: object
      required:
        - currency
        - line_items
        - customer_details
      properties:
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        line_items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - amount
            properties:
              amount:
                type: integer
              product_id:
                type: string
              tax_code:
                type: string
              quantity:
                type: integer
                default: 1
        customer_details:
          type: object
          properties:
            address:
              $ref: "#/components/schemas/Address"
            tax_ids:
              type: array
              items:
                type: object
            ip_address:
              type: string
        shipping_cost:
          type: object
          properties:
            amount:
              type: integer
            tax_code:
              type: string
    TaxCalculation:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: tax_calculation
        amount_total:
          type: integer
        tax_amount_exclusive:
          type: integer
        tax_amount_inclusive:
          type: integer
        currency:
          type: string
        line_items:
          type: array
          items:
            type: object
            properties:
              amount:
                type: integer
              tax_amount:
                type: integer
              tax_breakdown:
                type: array
                items:
                  type: object
        expires_at:
          type: string
          format: date-time
    CreateTaxTransactionRequest:
      type: object
      required:
        - calculation
        - reference
      properties:
        calculation:
          type: string
          description: Tax calculation ID
        reference:
          type: string
          description: Merchant order reference
    TaxTransaction:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: tax_transaction
        type:
          type: string
          enum:
            - transaction
            - reversal
        reference:
          type: string
        reversal:
          type: object
        line_items:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
    ThreeDSAuthRequest:
      type: object
      required:
        - payment_method
        - amount
        - currency
        - return_url
      properties:
        payment_method:
          type: string
        amount:
          type: integer
        currency:
          type: string
        return_url:
          type: string
          format: uri
        request_three_d_secure:
          type: string
          enum:
            - automatic
            - any
            - challenge
          default: automatic
        customer_id:
          type: string
    ThreeDSAuth:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: three_d_secure
        status:
          type: string
          enum:
            - processing
            - succeeded
            - failed
            - not_supported
        result:
          type: string
          enum:
            - authenticated
            - attempt_acknowledged
            - exempted
            - failed
            - not_enrolled
            - not_supported
        eci:
          type: string
          description: Electronic Commerce Indicator
        authentication_value:
          type: string
          description: CAVV / AAV
        transaction_id:
          type: string
        version:
          type: string
          enum:
            - "1.0"
            - "2.0"
            - "2.1"
            - "2.2"
        next_action:
          $ref: "#/components/schemas/NextAction"
        created_at:
          type: string
          format: date-time
    CreateMandateRequest:
      type: object
      required:
        - customer_id
        - payment_method_id
        - type
      properties:
        customer_id:
          type: string
        payment_method_id:
          type: string
        type:
          type: string
          enum:
            - single_use
            - multi_use
        payment_method_options:
          type: object
          properties:
            sepa_debit:
              type: object
            ach_debit:
              type: object
        customer_acceptance:
          type: object
          required:
            - type
            - accepted_at
          properties:
            type:
              type: string
              enum:
                - online
                - offline
            accepted_at:
              type: string
              format: date-time
            online:
              type: object
              properties:
                ip_address:
                  type: string
                user_agent:
                  type: string
    Mandate:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: mandate
        customer_id:
          type: string
        payment_method_id:
          type: string
        type:
          type: string
          enum:
            - single_use
            - multi_use
        status:
          type: string
          enum:
            - pending
            - active
            - inactive
            - expired
        single_use:
          type: object
          properties:
            amount:
              type: integer
            currency:
              type: string
        customer_acceptance:
          type: object
        payment_method_details:
          type: object
        created_at:
          type: string
          format: date-time
    MandateList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/Mandate"
        meta:
          $ref: "#/components/schemas/ListMeta"
    ExchangeRates:
      type: object
      properties:
        base_currency:
          type: string
        rates:
          type: object
          additionalProperties:
            type: number
        timestamp:
          type: string
          format: date-time
    CurrencyConvertRequest:
      type: object
      required:
        - amount
        - from_currency
        - to_currency
      properties:
        amount:
          type: integer
          minimum: 1
        from_currency:
          type: string
          pattern: "^[A-Z]{3}$"
        to_currency:
          type: string
          pattern: "^[A-Z]{3}$"
    CurrencyConvertResult:
      type: object
      properties:
        from_amount:
          type: integer
        from_currency:
          type: string
        to_amount:
          type: integer
        to_currency:
          type: string
        exchange_rate:
          type: number
        timestamp:
          type: string
          format: date-time
    NotificationPreferences:
      type: object
      properties:
        email:
          type: object
          properties:
            payment_receipt:
              type: boolean
            refund_confirmation:
              type: boolean
            dispute_notification:
              type: boolean
            payout_notification:
              type: boolean
        sms:
          type: object
          properties:
            payment_receipt:
              type: boolean
        webhook_events:
          type: array
          items:
            type: string
        marketing_opt_in:
          type: boolean
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - down
        version:
          type: string
        timestamp:
          type: string
          format: date-time
    ServiceStatus:
      type: object
      properties:
        overall:
          type: string
          enum:
            - operational
            - degraded
            - major_outage
        components:
          type: object
          properties:
            payment_processing:
              type: string
              enum:
                - operational
                - degraded
                - outage
            refunds:
              type: string
              enum:
                - operational
                - degraded
                - outage
            payouts:
              type: string
              enum:
                - operational
                - degraded
                - outage
            webhooks:
              type: string
              enum:
                - operational
                - degraded
                - outage
            fraud_detection:
              type: string
              enum:
                - operational
                - degraded
                - outage
            reporting:
              type: string
              enum:
                - operational
                - degraded
                - outage
        last_updated:
          type: string
          format: date-time
    ApiErrorResponse:
      type: object
      required:
        - success
        - errorCode
        - message
        - timestamp
      properties:
        success:
          type: boolean
          example: false
        errorCode:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error summary
          example: Invalid request parameters
        details:
          type: object
          description: "Additional error context (decline codes, field errors, etc.)"
          properties:
            decline_code:
              type: string
              description: Acquirer decline code (for payment failures)
            param:
              type: string
              description: Request field that caused the error
            payment_intent:
              type: object
              description: Payment object on payment failure
            doc_url:
              type: string
              format: uri
              description: Link to documentation for this error
        validationErrors:
          type: array
          description: Field-level validation errors
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the error occurred
        path:
          type: string
          description: Request path that caused the error
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: INVALID_REQUEST
            message: Invalid request parameters
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    Unauthorized:
      description: Authentication failed or missing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: UNAUTHORIZED
            message: Authentication required
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: FORBIDDEN
            message: You do not have permission to perform this action
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: NOT_FOUND
            message: The requested resource was not found
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments/pay_unknown
    Conflict:
      description: "Request conflicts with current state (e.g., duplicate idempotency key with different payload)"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: CONFLICT
            message: A resource with this identifier already exists
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    PaymentRequired:
      description: Payment declined by the issuer or payment processor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: PAYMENT_DECLINED
            message: Your card was declined
            details:
              decline_code: insufficient_funds
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    UnprocessableEntity:
      description: Business rule violation or semantic validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: VALIDATION_ERROR
            message: Request validation failed
            validationErrors:
              - field: amount
                message: Amount must be greater than 0
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum requests per window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current window
        X-RateLimit-Reset:
          schema:
            type: string
            format: date-time
          description: Timestamp when the rate limit window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: RATE_LIMIT_EXCEEDED
            message: Too many requests. Please retry after the indicated period.
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments
    InternalServerError:
      description: Unexpected internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            errorCode: INTERNAL_SERVER_ERROR
            message: An unexpected error occurred. Please try again later.
            timestamp: "2026-06-25T10:00:00Z"
            path: /v1/payments