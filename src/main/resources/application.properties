spring.application.name=payment-gateway-mock

# Serve the API under the /v1 version prefix (per the OpenAPI spec)
server.servlet.context-path=/v1
server.port=8080

# JSON conventions used throughout the spec
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Let unknown request fields through – this is a lenient mock
spring.jackson.deserialization.fail-on-unknown-properties=false

# Actuator health endpoints for OpenShift liveness/readiness probes
# (served under the /v1 context path: /v1/actuator/health/{liveness,readiness})
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Swagger UI / OpenAPI ---------------------------------------------------
# The mock's request bodies are intentionally loosely typed, so instead of
# auto-generating docs from the code we serve the curated OpenAPI spec
# (src/main/resources/static/openapi.yaml) and point Swagger UI at it.
# All paths below are relative to the /v1 context path.
#   Swagger UI : http://localhost:8080/v1/swagger-ui.html
#   Spec file  : http://localhost:8080/v1/openapi.yaml
springdoc.swagger-ui.path=/swagger-ui.html
# Relative to the context path — springdoc prefixes /v1 automatically -> /v1/openapi.yaml
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.disable-swagger-default-url=true

# Serve *.yaml static files with a sensible content type
spring.mvc.contentnegotiation.media-types.yaml=text/yaml
