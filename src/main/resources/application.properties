spring.application.name=payment-gateway-mock

server.port=8080

# JSON conventions
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Let unknown request fields through – this is a lenient mock
spring.jackson.deserialization.fail-on-unknown-properties=false

# Actuator health endpoints for OpenShift liveness/readiness probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Swagger UI / OpenAPI ---------------------------------------------------
# Springdoc auto-generates the OpenAPI spec from controller annotations.
#   Swagger UI : http://localhost:8080/swagger-ui.html
#   Spec JSON  : http://localhost:8080/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
