# Kubernetes/OpenShift manifest fetched by the deploy component from the repo
# root (/deploy.yaml). Deployment + Service + Route.
#
# The image name below is the bare ImageStreamTag produced by the build
# (payment-gateway-mock:latest); OpenShift resolves it from the ImageStream in
# the same namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-mock
  labels:
    app: payment-gateway-mock
    app.kubernetes.io/name: payment-gateway-mock
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway-mock
  template:
    metadata:
      labels:
        app: payment-gateway-mock
    spec:
      containers:
        - name: payment-gateway-mock
          image: payment-gateway-mock:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport"
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /v1/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway-mock
  labels:
    app: payment-gateway-mock
spec:
  selector:
    app: payment-gateway-mock
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: payment-gateway-mock
  labels:
    app: payment-gateway-mock
spec:
  to:
    kind: Service
    name: payment-gateway-mock
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
